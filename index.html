<!DOCTYPE html>
<html lang="es" data-bs-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="author" content="Carlos Cusi">
  <meta name="description" content="Calculadora de días interactiva con feriados dinámicos y modo oscuro. Asistencia y colaboración de Gemini.">
  <meta name="generator" content="Gemini CLI Agent">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffffff">
  <meta name="color-scheme" content="light dark">

  <!-- Open Graph / Social Media -->
  <meta property="og:title" content="Calculadora de Días">
  <meta property="og:description" content="Calculadora de días interactiva con feriados peruanos y modo oscuro.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="assets/images/favicon.svg">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Calculadora de Días">
  <meta name="twitter:description" content="Calculadora de días interactiva con feriados peruanos y modo oscuro.">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/images/favicon.svg">

  <!-- Favicon -->
  <link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">

  <title>Calculadora de Días</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">


  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <div class="container py-4">
    <header class="pb-3 mb-4 border-bottom">
      <h1 class="d-flex align-items-center text-body-emphasis text-decoration-none">
        <i class="bi bi-calendar-range me-3"></i>Calculadora de Días
      </h1>
      <p class="text-muted">Calcula fechas y días con feriados peruanos.</p>
    </header>

    <main>
      <div class="card shadow-sm mb-4">
        <div class="card-header">
          <h5 class="my-0 fw-normal">Acciones Rápidas</h5>
        </div>
        <div class="card-body">
          <div class="row align-items-center">
            <div class="col-md-auto">
              <div class="form-check form-switch mb-2 mb-md-0">
                <input class="form-check-input" type="checkbox" role="switch" id="diasGracia" onchange="toggleDiasGracia()">
                <label class="form-check-label" for="diasGracia">+2 días por proceso</label>
              </div>
            </div>
            <div class="col">
              <div class="btn-toolbar quick-actions-container" role="toolbar" aria-label="Toolbar with button groups">
                <div class="row g-1 w-100">
                  <!-- Fila 1: Acciones rápidas básicas -->
                  <div class="col-6 col-md-auto">
                    <div class="btn-group w-100" role="group" aria-label="Quick days">
                      <button type="button" class="btn btn-sm btn-outline-secondary" onclick="calculoRapido(45)">45d</button>
                      <button type="button" class="btn btn-sm btn-outline-secondary" onclick="calculoRapido(60)">60d</button>
                    </div>
                  </div>
                  <div class="col-6 col-md-auto">
                    <div class="btn-group w-100" role="group" aria-label="Quick combos 1">
                      <button type="button" class="btn btn-sm btn-outline-secondary" onclick="calculoMultiples([45, 60])">45/60</button>
                      <button type="button" class="btn btn-sm btn-outline-secondary" onclick="calculoMultiples([60, 75])">60/75</button>
                    </div>
                  </div>
                  <!-- Fila 2: Combinaciones adicionales -->
                  <div class="col-6 col-md-auto">
                    <div class="btn-group w-100" role="group" aria-label="Quick days 2">
                      <button type="button" class="btn btn-sm btn-outline-secondary" onclick="calculoRapido(75)">75d</button>
                      <button type="button" class="btn btn-sm btn-outline-secondary" onclick="calculoMultiples([40, 50, 60])">40/50/60</button>
                    </div>
                  </div>
                  <div class="col-6 col-md-auto">
                    <div class="btn-group w-100" role="group" aria-label="Quick combos 2">
                      <button type="button" class="btn btn-sm btn-outline-secondary" onclick="calculoMultiples([45, 60, 75])">45/60/75</button>
                      <button type="button" class="btn btn-sm btn-outline-secondary" onclick="calculoMultiples([45, 55, 65, 75])">45/55/65/75</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="filas-calculo">
        <!-- Fila de cálculo inicial - Sistema de Tarjetas con 2 filas en móvil -->
        <div class="card card-calculo mb-3" data-row="1">
          <div class="card-body p-3">
            <!-- Fila 1: Fecha + Días (en móvil) -->
            <div class="row g-2 align-items-center mb-2 mb-sm-0">
              <div class="col-6 col-sm-4 col-md-3">
                <div class="form-floating">
                  <input type="text" class="form-control input-fecha" id="fecha1" placeholder="dd/mm/yyyy" oninput="formatearFechaInput(this); dispararCalculo(1);" onfocus="this.select();">
                  <label for="fecha1">Fecha</label>
                </div>
                <span class="text-danger small" id="errorFecha1" role="alert" aria-live="polite"></span>
              </div>
              <div class="col-6 col-sm-3 col-md-2">
                <div class="form-floating">
                  <input type="number" class="form-control input-dias" id="dias1" placeholder="Días" oninput="dispararCalculo(1);" onfocus="this.select();">
                  <label for="dias1">Días</label>
                </div>
                <span class="text-danger small" id="errorDias1" role="alert" aria-live="polite"></span>
              </div>
            </div>
            <!-- Fila 2: Resultado + Botón (en móvil) -->
            <div class="row g-2 align-items-center">
              <div class="col-8 col-sm-5 col-md-5">
                <div class="form-floating">
                  <input type="text" class="form-control resultado" id="resultado1" placeholder="Resultado" readonly>
                  <label for="resultado1">Resultado</label>
                </div>
              </div>
              <div class="col-4 col-sm-3 col-md-2">
                <button class="btn btn-success btn-agregar w-100" onclick="agregarFila()" title="Añadir fila (Ctrl+N)" aria-label="Añadir fila">
                  <i class="bi bi-plus-circle"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
      
      <div id="fechasAdicionales" role="list" aria-label="Filas de cálculo adicionales"></div>


      <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
        <div class="d-flex gap-2">
           <button class="btn btn-primary" onclick="descargarXLSX()" title="Descargar resultados en formato XLSX">
             <i class="bi bi-file-earmark-excel me-1"></i> XLSX
           </button>
           <button class="btn btn-secondary" onclick="copiarResultados()" title="Copiar resultados al portapapeles">
             <i class="bi bi-clipboard me-1"></i> Copiar
           </button>
           <button class="btn btn-danger" onclick="limpiar()" title="Limpiar todos los campos (Ctrl+L)">
             <i class="bi bi-trash me-1"></i> Limpiar
           </button>
        </div>
         <div class="leyenda d-flex align-items-center gap-3">
            <span class="leyenda-item"><span class="color-box feriado"></span> Feriado/Dom</span>
            <span class="leyenda-item"><span class="color-box sabado"></span> Sábado</span>
            <span class="leyenda-item"><span class="color-box normal"></span> Día hábil</span>
        </div>
        <button class="btn btn-outline-secondary" id="toggle-dark-mode" onclick="toggleDarkMode()" title="Alternar modo claro/oscuro (Ctrl+D)">
          <i class="bi bi-moon-stars"></i>
        </button>
      </div>

    </main>

    <!-- Historial de cálculos (Offcanvas) -->
    <aside class="offcanvas offcanvas-end" tabindex="-1" id="historialOffcanvas" aria-labelledby="historialOffcanvasLabel">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="historialOffcanvasLabel">📜 Historial de Cálculos</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      <div class="offcanvas-body">
        <ul id="historialLista" class="list-group list-group-flush"></ul>
        <button class="btn btn-sm btn-outline-danger mt-3" onclick="limpiarHistorial()" title="Limpiar historial">
          <i class="bi bi-trash me-1"></i> Limpiar Historial
        </button>
      </div>
    </aside>

    <!-- Botón flotante para historial -->
    <button class="btn btn-primary btn-lg rounded-circle shadow" id="btn-historial-flotante" data-bs-toggle="offcanvas" data-bs-target="#historialOffcanvas" title="Ver historial (Ctrl+H)" style="position: fixed; bottom: 20px; right: 20px; z-index: 1050;">
      <i class="bi bi-journal-text"></i>
      <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="historialBadge">0</span>
    </button>

    <!-- Toast para notificaciones -->
     <div class="toast-container position-fixed bottom-0 end-0 p-3">
      <div id="toast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
          <div class="toast-body"></div>
          <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
      </div>
    </div>
    

    <footer class="pt-3 mt-4 text-body-secondary border-top">
       <span class="version-info" title="Calculadora de Días v2.0&#10;&#10;Desarrollado por Carlos Cusi&#10;Asistencia y colaboración de Gemini (Google)&#10;&#1A;Atajos de teclado:&#10;Ctrl+D: Modo oscuro&#10;Ctrl+L: Limpiar&#10;Ctrl+H: Historial&#10;Ctrl+N: Nueva fila">cc_calculadora v2.0</span>
    </footer>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="js/script.js"></script>

  <!-- Service Worker para PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.error('Service Worker registration failed:', err));
      });
    }
  </script>

</body>

</html>
